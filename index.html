<!DOCTYPE html>
<html lang="es">

<!--Elemento <head> provee información general (metadatos) del documento, incluyendo título y enlaces a las hojas de estilos.-->

    <head>
        <meta charset="utf-8" />
        <title>Galaxias: islas del universo</title>

        <!-- Estilos CSS (incluye Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>


    <!--El elemento <body> define el cuerpo del HTML, es decir, todo el contenido *visible* en una página web.-->

    <body>

        <!-- Portada-->
        <header>

            <div class="col-lg-6">

                <!-- Texto de la portada-->

                <h1>Galaxias: islas del universo</h1>

                <p>Una galaxia es un enorme sistema formado por estrellas, planetas, gas, polvo cósmico y materia oscura. Todos estos elementos permanecen unidos por la gravedad.</p>

            </div>

            <!-- Imagen de la portada-->

            <img src="https://apod.nasa.gov/apod/image/0801/M31_hallas.jpg" alt="Galaxia de Andrómeda" width="408" height="229"/>

        </header>

    </body>

</html>
